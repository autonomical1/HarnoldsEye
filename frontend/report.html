<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harnold's Eye — Scan Report</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky: #3aafff;
        --sky-deep: #1b7fd4;
        --grass: #4ade60;
        --grass-dark: #2d9e3f;
        --barn-orange: #ff8a2b;
        --barn-red: #e54d2e;
        --golden: #ffd93d;
        --golden-dark: #e6b800;
        --cream: #fff8e7;
        --white: #ffffff;
        --dark: #1a2332;
        --darker: #0d1b2a;
        --feather-white: #f5f0e8;
        --critical: #ff4d6a;
        --high: #ff8a2b;
        --medium: #ffd93d;
        --low: #4ade60;
        --info: #3aafff;
        --card-bg: rgba(255, 255, 255, 0.04);
        --card-border: rgba(255, 255, 255, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Nunito", sans-serif;
        background: var(--dark);
        color: var(--cream);
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* ===== NAVBAR ===== */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 100;
        padding: 16px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(26, 35, 50, 0.85);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .nav-logo {
        font-family: "Lilita One", cursive;
        font-size: 1.5rem;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo .logo-text span {
        color: var(--golden);
      }
      .nav-links {
        display: flex;
        gap: 30px;
        list-style: none;
      }
      .nav-links a {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-weight: 700;
        font-size: 0.9rem;
        transition: color 0.3s;
      }
      .nav-links a:hover {
        color: var(--golden);
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--cream);
        padding: 8px 18px;
        border-radius: 10px;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
      }
      .back-btn:hover {
        background: rgba(255, 255, 255, 0.18);
        border-color: var(--golden);
        color: var(--golden);
      }

      /* ===== SCANNING OVERLAY ===== */
      .scan-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: var(--dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition:
          opacity 0.6s,
          visibility 0.6s;
      }
      .scan-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .scan-goose {
        width: 140px;
        height: 160px;
        animation: goose-scan-bob 1s ease-in-out infinite;
      }
      @keyframes goose-scan-bob {
        0%,
        100% {
          transform: translateY(0) rotate(-2deg);
        }
        50% {
          transform: translateY(-15px) rotate(2deg);
        }
      }

      .scan-text {
        font-family: "Lilita One", cursive;
        font-size: 1.8rem;
        color: var(--white);
        margin-top: 24px;
        text-shadow: 2px 2px 0 var(--barn-orange);
      }

      .scan-progress-bar {
        width: 320px;
        height: 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        margin-top: 20px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .scan-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--sky),
          var(--grass),
          var(--golden)
        );
        border-radius: 20px;
        transition: width 0.3s;
        position: relative;
      }
      .scan-progress-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .scan-status {
        margin-top: 14px;
        font-size: 0.85rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.5);
        font-family: "JetBrains Mono", monospace;
        min-height: 20px;
      }

      .scan-feathers {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .scan-feather {
        position: absolute;
        width: 16px;
        height: 32px;
        animation: featherFall linear infinite;
      }
      @keyframes featherFall {
        0% {
          transform: translateY(-50px) rotate(0deg) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(100vh) rotate(720deg) translateX(60px);
          opacity: 0;
        }
      }

      /* ===== MAIN REPORT ===== */
      .report-page {
        padding: 90px 24px 40px;
        max-width: 1100px;
        margin: 0 auto;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.6s 0.3s,
          transform 0.6s 0.3s;
      }
      .report-page.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Header */
      .report-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }
      .report-header-left {
        flex: 1;
        min-width: 280px;
      }

      .report-title {
        font-family: "Lilita One", cursive;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        color: var(--white);
        text-shadow: 2px 2px 0 var(--barn-orange);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .report-repo {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9rem;
        color: var(--sky);
        font-weight: 600;
        word-break: break-all;
      }
      .report-meta {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .meta-item {
        font-size: 0.8rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.45);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .report-score-box {
        text-align: center;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 24px 30px;
        min-width: 180px;
      }
      .score-label {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.45);
        margin-bottom: 8px;
      }
      .score-ring {
        width: 100px;
        height: 100px;
        margin: 0 auto 8px;
        position: relative;
      }
      .score-ring svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .score-ring-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 8;
      }
      .score-ring-fill {
        fill: none;
        stroke-width: 8;
        stroke-linecap: round;
        transition: stroke-dashoffset 1.5s ease-out;
      }
      .score-value {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Lilita One", cursive;
        font-size: 1.8rem;
        color: var(--white);
      }
      .score-grade {
        font-family: "Lilita One", cursive;
        font-size: 1rem;
      }

      /* Severity summary cards */
      .severity-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 30px;
      }
      @media (max-width: 700px) {
        .severity-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .severity-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
        cursor: default;
      }
      .severity-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .severity-card.critical::before {
        background: var(--critical);
      }
      .severity-card.high::before {
        background: var(--high);
      }
      .severity-card.medium::before {
        background: var(--medium);
      }
      .severity-card.low::before {
        background: var(--low);
      }

      .severity-card:hover {
        transform: translateY(-4px);
        border-color: rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.07);
      }
      .severity-count {
        font-family: "Lilita One", cursive;
        font-size: 2.4rem;
        line-height: 1;
        margin-bottom: 4px;
      }
      .severity-card.critical .severity-count {
        color: var(--critical);
      }
      .severity-card.high .severity-count {
        color: var(--high);
      }
      .severity-card.medium .severity-count {
        color: var(--medium);
      }
      .severity-card.low .severity-count {
        color: var(--low);
      }

      .severity-label {
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.45);
      }

      /* Vulnerability list */
      .vuln-section-title {
        font-family: "Lilita One", cursive;
        font-size: 1.4rem;
        color: var(--white);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .vuln-section-title span {
        color: var(--golden);
      }

      .vuln-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 40px;
      }

      .vuln-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 20px 24px;
        transition: all 0.3s;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        animation: slideUp 0.5s ease-out both;
      }
      .vuln-card:nth-child(1) {
        animation-delay: 0.1s;
      }
      .vuln-card:nth-child(2) {
        animation-delay: 0.2s;
      }
      .vuln-card:nth-child(3) {
        animation-delay: 0.3s;
      }
      .vuln-card:nth-child(4) {
        animation-delay: 0.4s;
      }
      .vuln-card:nth-child(5) {
        animation-delay: 0.5s;
      }
      .vuln-card:nth-child(6) {
        animation-delay: 0.6s;
      }
      .vuln-card:nth-child(7) {
        animation-delay: 0.7s;
      }
      .vuln-card:nth-child(8) {
        animation-delay: 0.8s;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .vuln-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 4px;
      }
      .vuln-card.critical::before {
        background: var(--critical);
      }
      .vuln-card.high::before {
        background: var(--high);
      }
      .vuln-card.medium::before {
        background: var(--medium);
      }
      .vuln-card.low::before {
        background: var(--low);
      }

      .vuln-card:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateX(4px);
      }

      .vuln-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .vuln-name {
        font-weight: 800;
        font-size: 1rem;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .vuln-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 8px;
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .vuln-badge.critical {
        background: rgba(255, 77, 106, 0.15);
        color: var(--critical);
        border: 1px solid rgba(255, 77, 106, 0.3);
      }
      .vuln-badge.high {
        background: rgba(255, 138, 43, 0.15);
        color: var(--high);
        border: 1px solid rgba(255, 138, 43, 0.3);
      }
      .vuln-badge.medium {
        background: rgba(255, 217, 61, 0.15);
        color: var(--medium);
        border: 1px solid rgba(255, 217, 61, 0.3);
      }
      .vuln-badge.low {
        background: rgba(74, 222, 96, 0.15);
        color: var(--low);
        border: 1px solid rgba(74, 222, 96, 0.3);
      }

      .vuln-desc {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 600;
        line-height: 1.5;
        margin-bottom: 10px;
      }
      .vuln-row {
        margin-bottom: 0.55rem;
      }
      .vuln-row .vuln-call-hint {
        margin-top: 0.2rem;
        margin-bottom: 0;
        font-weight: 500;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.5);
      }
      .vuln-row:last-child {
        margin-bottom: 0;
      }
      .vuln-type {
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: rgba(255, 186, 120, 0.92);
        margin-top: 0.15rem;
      }
      .vuln-file {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--sky);
        background: rgba(58, 175, 255, 0.08);
        padding: 4px 10px;
        border-radius: 6px;
        display: inline-block;
        margin-right: 8px;
        font-weight: 600;
      }
      .vuln-cve {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.35);
        font-weight: 600;
      }

      .vuln-fix {
        margin-top: 12px;
        padding: 12px 16px;
        background: rgba(74, 222, 96, 0.06);
        border: 1px solid rgba(74, 222, 96, 0.15);
        border-radius: 10px;
        display: none;
      }
      .vuln-card.expanded .vuln-fix {
        display: block;
      }

      .vuln-fix-label {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--grass);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .vuln-fix-text {
        font-size: 0.83rem;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 600;
        line-height: 1.5;
      }
      .vuln-fix-code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--grass);
        background: rgba(0, 0, 0, 0.3);
        padding: 10px 14px;
        border-radius: 8px;
        margin-top: 8px;
        display: block;
        white-space: pre-wrap;
        overflow-x: auto;
      }

      .expand-hint {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.3);
        font-weight: 700;
        margin-top: 6px;
        text-align: right;
      }
      .vuln-card.expanded .expand-hint {
        display: none;
      }

      /* Goose report buddy */
      .report-goose {
        position: fixed;
        bottom: 20px;
        right: 24px;
        z-index: 50;
        animation: goose-float 3s ease-in-out infinite;
        cursor: pointer;
      }
      @keyframes goose-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .goose-tip {
        position: absolute;
        bottom: 110%;
        right: 0;
        background: var(--white);
        color: var(--dark);
        font-family: "Nunito", sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        padding: 10px 16px;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        width: 220px;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.3s;
        pointer-events: none;
        line-height: 1.4;
      }
      .goose-tip::after {
        content: "";
        position: absolute;
        bottom: -7px;
        right: 30px;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-top: 8px solid var(--white);
      }
      .report-goose:hover .goose-tip {
        opacity: 1;
        transform: translateY(0);
      }

      /* Background effects */
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse at 10% 20%,
            rgba(58, 175, 255, 0.04),
            transparent 50%
          ),
          radial-gradient(
            ellipse at 90% 80%,
            rgba(74, 222, 96, 0.04),
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            rgba(255, 138, 43, 0.02),
            transparent 60%
          );
      }
      .bg-dots {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px
        );
        background-size: 30px 30px;
      }

      /* Footer */
      .footer {
        background: #0a1520;
        padding: 24px;
        text-align: center;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.35);
        font-weight: 600;
        border-top: 2px solid rgba(255, 255, 255, 0.05);
        position: relative;
        z-index: 1;
      }
      .footer span {
        color: var(--golden);
      }

      /* Sprout wiggle */
      @keyframes sprout-wiggle {
        0%,
        100% {
          transform: rotate(-8deg);
        }
        50% {
          transform: rotate(8deg);
        }
      }

      /* Actions bar */
      .actions-bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 30px;
      }
      .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 12px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.3s;
        border: none;
      }
      .action-btn.primary {
        background: linear-gradient(
          135deg,
          var(--barn-orange),
          var(--barn-red)
        );
        color: white;
      }
      .action-btn.primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(229, 77, 46, 0.3);
      }
      .action-btn.secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--cream);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .action-btn.secondary:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: var(--golden);
        color: var(--golden);
      }

      /* Dependency table */
      .dep-section {
        margin-bottom: 40px;
      }
      .dep-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 6px;
      }
      .dep-table th {
        text-align: left;
        padding: 10px 16px;
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.35);
      }
      .dep-table td {
        padding: 12px 16px;
        background: var(--card-bg);
        font-size: 0.85rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.7);
      }
      .dep-table tr td:first-child {
        border-radius: 10px 0 0 10px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        color: var(--sky);
      }
      .dep-table tr td:last-child {
        border-radius: 0 10px 10px 0;
      }
      .dep-outdated {
        color: var(--barn-orange);
        font-weight: 800;
      }
      .dep-ok {
        color: var(--grass);
        font-weight: 800;
      }

      @media (max-width: 600px) {
        .report-header {
          flex-direction: column;
        }
        .navbar {
          padding: 12px 16px;
        }
        .nav-links {
          display: none;
        }
        .report-page {
          padding: 80px 16px 30px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01s !important;
          transition-duration: 0.01s !important;
        }
      }

      /* Minimal report-specific styling */
      .bg-grid,
      .bg-dots,
      .navbar,
      .report-goose,
      .footer {
        display: none !important;
      }

      .report-page {
        padding: 80px 24px 40px;
        max-width: 900px;
        margin: 0 auto;
        min-height: 100vh;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      .report-page.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .report-title-area {
        margin-bottom: 32px;
        text-align: center;
      }

      .report-title {
        font-family: "Lilita One", cursive;
        font-size: clamp(2.2rem, 5vw, 3.4rem);
        letter-spacing: -0.04em;
        color: #ffffff;
        margin-bottom: 10px;
      }

      .vuln-list {
        display: grid;
        gap: 16px;
      }

      .vuln-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        padding: 22px 24px;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.18);
      }

      .vuln-name {
        font-size: 1rem;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 10px;
      }

      .vuln-desc {
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.6;
        margin-bottom: 14px;
      }

      .vuln-file {
        display: block;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.95rem;
        color: #c5e8ff;
        background: rgba(58, 175, 255, 0.12);
        padding: 12px 14px;
        border-radius: 14px;
        margin-bottom: 10px;
        word-break: break-word;
      }

      .report-loading {
        border-color: rgba(58, 175, 255, 0.25);
      }

      .report-back-btn {
        display: inline-block;
        padding: 10px 18px;
        margin-bottom: 24px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .report-back-btn:hover {
        background: rgba(255, 255, 255, 0.18);
        border-color: rgba(255, 217, 61, 0.6);
        color: #ffd93d;
      }
    </style>
  </head>
  <body>
    <!-- Background effects -->
    <div class="bg-grid"></div>
    <div class="bg-dots"></div>

    <!-- Scanning Overlay -->
    <div class="scan-overlay" id="scanOverlay">
      <div class="scan-feathers" id="scanFeathers"></div>
      <svg
        class="scan-goose"
        viewBox="0 0 120 140"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <ellipse
          cx="60"
          cy="80"
          rx="42"
          ry="48"
          fill="#FFF5E0"
          stroke="#3A3226"
          stroke-width="3.5"
        />
        <ellipse
          cx="60"
          cy="55"
          rx="12"
          ry="5.5"
          fill="#F0A030"
          stroke="#3A3226"
          stroke-width="2.5"
        />
        <circle cx="47" cy="44" r="3.5" fill="#3A3226" />
        <circle cx="73" cy="44" r="3.5" fill="#3A3226" />
        <ellipse
          cx="38"
          cy="55"
          rx="8"
          ry="4.5"
          fill="#FFB4B4"
          opacity="0.35"
        />
        <ellipse
          cx="82"
          cy="55"
          rx="8"
          ry="4.5"
          fill="#FFB4B4"
          opacity="0.35"
        />
        <g
          style="
            animation: sprout-wiggle 1.5s ease-in-out infinite;
            transform-origin: 60px 32px;
          "
        >
          <line
            x1="60"
            y1="32"
            x2="60"
            y2="12"
            stroke="#5CB85C"
            stroke-width="3.5"
            stroke-linecap="round"
          />
          <ellipse
            cx="51"
            cy="10"
            rx="8"
            ry="5.5"
            fill="#5CB85C"
            transform="rotate(-25, 51, 10)"
          />
          <ellipse
            cx="69"
            cy="10"
            rx="8"
            ry="5.5"
            fill="#5CB85C"
            transform="rotate(25, 69, 10)"
          />
        </g>
        <ellipse
          cx="44"
          cy="128"
          rx="14"
          ry="5.5"
          fill="#F0A030"
          stroke="#3A3226"
          stroke-width="2.5"
        />
        <ellipse
          cx="76"
          cy="128"
          rx="14"
          ry="5.5"
          fill="#F0A030"
          stroke="#3A3226"
          stroke-width="2.5"
        />
        <path
          d="M18 72 Q8 80 18 92"
          stroke="#3A3226"
          stroke-width="2.5"
          fill="none"
          stroke-linecap="round"
        />
        <path
          d="M102 72 Q112 80 102 92"
          stroke="#3A3226"
          stroke-width="2.5"
          fill="none"
          stroke-linecap="round"
        />
        <!-- magnifying glass held up -->
        <g transform="translate(78, 40) rotate(15)">
          <circle
            cx="0"
            cy="0"
            r="14"
            fill="none"
            stroke="#FFD93D"
            stroke-width="3"
          />
          <line
            x1="10"
            y1="10"
            x2="20"
            y2="20"
            stroke="#FFD93D"
            stroke-width="3"
            stroke-linecap="round"
          />
          <circle cx="0" cy="0" r="10" fill="rgba(58,175,255,0.1)" />
        </g>
      </svg>
      <div class="scan-text" id="scanText">Releasing the Geese...</div>
      <div class="scan-progress-bar">
        <div class="scan-progress-fill" id="scanFill"></div>
      </div>
      <div class="scan-status" id="scanStatus">Initializing flock...</div>
    </div>



    <main class="report-page" id="reportPage">
      <a href="index.html" class="report-back-btn">← New Scan</a>
      <div class="report-title-area">
        <h1 class="report-title" id="reportStatus">Loading vulnerability status...</h1>
      </div>
      <div class="vuln-list" id="vulnList">
        <div class="vuln-card info report-loading" id="reportLoading">
          <div class="vuln-name">Loading analysis results...</div>
          <div class="vuln-desc">
            Fetching vulnerability regions from the JSON analysis file.
          </div>
        </div>
      </div>
    </main>

    <script>
      // Parse repo URL from query params
      const params = new URLSearchParams(window.location.search);
      const repoUrl = params.get("repo");

      const BACKEND_BASE_URL = "http://66.42.120.203:8000";
      const SCAN_URL = `${BACKEND_BASE_URL}/api/scan`;
      const STATUS_URL = `${BACKEND_BASE_URL}/api/scan/status`;
      const VULN_URL = `${BACKEND_BASE_URL}/api/vulnerabilities.json`;
      const POLL_DELAY_MS = 1000;

      /** Set from GET /api/health before scan — false when server has no GEMINI_API_KEY. */
      let geminiVerifyConfigured = true;

      // Generate scan feathers
      const sf = document.getElementById("scanFeathers");
      for (let i = 0; i < 12; i++) {
        const f = document.createElement("div");
        f.className = "scan-feather";
        f.style.left = Math.random() * 100 + "%";
        f.style.animationDuration = 4 + Math.random() * 6 + "s";
        f.style.animationDelay = Math.random() * 5 + "s";
        f.innerHTML = `<svg viewBox="0 0 16 32" fill="none"><path d="M8 0 C8 0 3 8 2 16 C1 24 6 32 8 32 C10 32 15 24 14 16 C13 8 8 0 8 0Z" fill="rgba(245,240,232,0.6)"/></svg>`;
        sf.appendChild(f);
      }

      function setScanOverlay(text, statusText, pct) {
        document.getElementById("scanText").textContent = text;
        document.getElementById("scanStatus").textContent = statusText;
        document.getElementById("scanFill").style.width = `${pct}%`;
      }

      function scanProgressSubtitle(payload) {
        const mlOnlyNote =
          geminiVerifyConfigured === false
            ? "ML-only (Gemini API not configured on server). "
            : "";

        const phase = payload.phase;
        const files = payload.c_cpp_files;
        const tot = payload.snippets_total;
        const done = payload.snippets_scored;

        if (
          phase === "scoring_snippets" &&
          tot != null &&
          done != null &&
          files != null
        ) {
          return (
            mlOnlyNote +
            `Scoring ${tot} snippet window(s) from ${files} C/C++ file(s) · snippets ${done}/${tot}.`
          );
        }
        if (phase === "gemini_verify" && tot != null && done != null) {
          return `Making a Gemini API call (binary vulnerability check) · snippets ${done}/${tot}.`;
        }

        const parts = [];
        if (payload.detail) parts.push(payload.detail);
        const tail = parts.length ? parts.join(" · ") : null;
        if (tail) return mlOnlyNote + tail;
        return mlOnlyNote ? mlOnlyNote.trim() : null;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatVulnTypeLabel(t) {
        if (!t || typeof t !== "string") return "";
        const words = t.replace(/_/g, " ").trim().split(/\s+/);
        if (!words.length) return "";
        return words
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
          .join(" ");
      }

      function renderError(title, message) {
        document.getElementById("reportStatus").textContent = title;
        document.getElementById("vulnList").innerHTML = `
          <div class="vuln-card info">
            <div class="vuln-name">${title}</div>
            <div class="vuln-desc">${message}</div>
          </div>
        `;
        setScanOverlay("Scan stopped", message, 100);
        document.getElementById("scanOverlay").classList.add("hidden");
        document.getElementById("reportPage").classList.add("visible");
      }

      function renderVulnerabilities(payload) {
        const listEl = document.getElementById("vulnList");
        const titleEl = document.getElementById("reportStatus");
        const items = Array.isArray(payload) ? payload : [];

        if (items.length === 0) {
          titleEl.textContent = "No Vulnerabilities Detected";
          listEl.innerHTML = `
            <div class="vuln-card info">
              <div class="vuln-name">No vulnerabilities were found.</div>
            </div>
          `;
          setScanOverlay("Report complete", "No vulnerabilities found", 100);
          return;
        }

        titleEl.textContent = "Vulnerabilities found";
        listEl.innerHTML = "";

        let totalRanges = 0;
        items.forEach((item) => {
          const file = item.file_name || "Unknown file";
          const fileEsc = escapeHtml(file);
          let rangeHtml = "";

          if (Array.isArray(item.findings) && item.findings.length) {
            totalRanges += item.findings.length;
            rangeHtml = item.findings
              .map((f) => {
                const pair = f.line_numbers;
                if (!Array.isArray(pair) || pair.length !== 2) return "";
                const start = Number(pair[0]);
                const end = Number(pair[1]);
                const typRaw = f.vulnerability_type || "";
                const typ = formatVulnTypeLabel(typRaw);
                const linePart =
                  start === end
                    ? `line ${start}`
                    : `lines ${start}-${end}`;
                const typeBlock = typ
                  ? `<div class="vuln-type">${escapeHtml(typ)}</div>`
                  : "";
                let callHint = "";
                if (
                  f.finding_role === "call_site" &&
                  Array.isArray(f.sink_line_numbers) &&
                  f.sink_line_numbers.length === 2
                ) {
                  const ss = Number(f.sink_line_numbers[0]);
                  const se = Number(f.sink_line_numbers[1]);
                  const sinkPart =
                    ss === se ? `line ${ss}` : `lines ${ss}-${se}`;
                  const fn = f.sink_function
                    ? escapeHtml(String(f.sink_function))
                    : "sink";
                  callHint = `<div class="vuln-desc vuln-call-hint">Call site → ${fn} (${sinkPart})</div>`;
                }
                return `<div class="vuln-row"><div class="vuln-file">${fileEsc}: ${linePart}</div>${typeBlock}${callHint}</div>`;
              })
              .join("");
          } else {
            const ranges = Array.isArray(item.line_numbers) ? item.line_numbers : [];
            totalRanges += ranges.length;
            rangeHtml = ranges
              .map(([start, end]) => {
                if (start === end) {
                  return `<div class="vuln-row"><div class="vuln-file">${fileEsc}: line ${start}</div></div>`;
                }
                return `<div class="vuln-row"><div class="vuln-file">${fileEsc}: lines ${start}-${end}</div></div>`;
              })
              .join("");
          }

          listEl.insertAdjacentHTML(
            "beforeend",
            `
            <div class="vuln-card info">
              <div class="vuln-name">${fileEsc}</div>
              ${rangeHtml}
            </div>
          `,
          );
        });

        setScanOverlay(
          "Report complete",
          `${totalRanges} vulnerabilities found`,
          100,
        );
      }

      async function loadVulnerabilities() {
        try {
          const resp = await fetch(VULN_URL, { cache: "no-store" });
          if (!resp.ok) {
            throw new Error(`Unable to load vulnerabilities (${resp.status})`);
          }
          const payload = await resp.json();
          document.getElementById("scanOverlay").classList.add("hidden");
          document.getElementById("reportPage").classList.add("visible");
          renderVulnerabilities(payload);
        } catch (err) {
          renderError(
            "Unable to load report",
            err.message || "Failed to fetch vulnerability results.",
          );
        }
      }

      async function pollScanStatus() {
        try {
          const resp = await fetch(STATUS_URL, { cache: "no-store" });
          if (!resp.ok) {
            throw new Error(`Status check failed (${resp.status})`);
          }
          const statusPayload = await resp.json();
          const status = statusPayload.status || "idle";

          if (status === "queued") {
            setScanOverlay(
              "Scan queued",
              scanProgressSubtitle(statusPayload) ||
                "Waiting for the scanner to start...",
              30,
            );
            setTimeout(pollScanStatus, POLL_DELAY_MS);
            return;
          }

          if (status === "processing") {
            const sub =
              scanProgressSubtitle(statusPayload) ||
              "Processing repository data...";
            let pct = 65;
            if (
              statusPayload.snippets_total > 0 &&
              statusPayload.snippets_scored != null
            ) {
              pct =
                12 +
                Math.round(
                  (75 * statusPayload.snippets_scored) /
                    statusPayload.snippets_total,
                );
            }
            setScanOverlay("The flock is scanning...", sub, Math.min(92, pct));
            setTimeout(pollScanStatus, POLL_DELAY_MS);
            return;
          }

          if (status === "completed") {
            setScanOverlay("HONK! Scan complete", "Fetching final report...", 90);
            await loadVulnerabilities();
            return;
          }

          if (status === "failed") {
            renderError(
              "Scan failed",
              statusPayload.error || "The backend returned a failed scan state.",
            );
            return;
          }

          setScanOverlay("Waiting on scanner", `Status: ${status}`, 50);
          setTimeout(pollScanStatus, POLL_DELAY_MS);
        } catch (err) {
          renderError(
            "Unable to poll scan status",
            err.message || "Network error while checking scan status.",
          );
        }
      }

      async function startScanFlow() {
        if (!repoUrl) {
          renderError(
            "No repository specified",
            "Return to the home screen and start the scan from there.",
          );
          return;
        }

        setScanOverlay("Preparing the flock...", "Sending scan request...", 10);

        try {
          try {
            const healthResp = await fetch(`${BACKEND_BASE_URL}/api/health`, {
              cache: "no-store",
            });
            if (healthResp.ok) {
              const h = await healthResp.json();
              geminiVerifyConfigured = h.gemini_verify_enabled === true;
            }
          } catch (_) {
            geminiVerifyConfigured = true;
          }

          const resp = await fetch(SCAN_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ github_url: repoUrl }),
          });

          if (!resp.ok) {
            const payload = await resp.json().catch(() => null);
            if (resp.status === 409) {
              setScanOverlay(
                "Scan in progress",
                payload?.detail || "Waiting for the current scan to finish...",
                25,
              );
              pollScanStatus();
              return;
            }
            throw new Error(
              payload?.detail || payload?.message || `Failed to start scan (${resp.status})`,
            );
          }

          await resp.json();
          setScanOverlay("Scan queued", "Waiting for the scanner to begin...", 25);
          pollScanStatus();
        } catch (err) {
          renderError(
            "Unable to start scan",
            err.message || "Network error while starting the scan.",
          );
        }
      }

      startScanFlow();
    </script>
  </body>
</html>
