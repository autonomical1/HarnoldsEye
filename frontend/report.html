<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harnold's Eye — Scan Report</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky: #3aafff;
        --sky-deep: #1b7fd4;
        --grass: #4ade60;
        --grass-dark: #2d9e3f;
        --barn-orange: #ff8a2b;
        --barn-red: #e54d2e;
        --golden: #ffd93d;
        --golden-dark: #e6b800;
        --cream: #fff8e7;
        --white: #ffffff;
        --dark: #1a2332;
        --darker: #0d1b2a;
        --feather-white: #f5f0e8;
        --critical: #ff4d6a;
        --high: #ff8a2b;
        --medium: #ffd93d;
        --low: #4ade60;
        --info: #3aafff;
        --card-bg: rgba(255, 255, 255, 0.04);
        --card-border: rgba(255, 255, 255, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Nunito", sans-serif;
        /* Fixed to viewport so scrolling doesn’t shift sky vs. grass dramatically */
        background:
          radial-gradient(
            circle at 12% 10%,
            rgba(58, 175, 255, 0.16),
            transparent 46%
          ),
          radial-gradient(
            circle at 90% 65%,
            rgba(74, 222, 96, 0.05),
            transparent 44%
          ),
          linear-gradient(
            180deg,
            #2f7ec4 0%,
            #245f96 22%,
            #1a4a78 44%,
            #142f4a 66%,
            #101f32 88%,
            #0c1828 100%
          );
        background-attachment: fixed;
        color: var(--cream);
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* ===== NAVBAR (matches index.html) ===== */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 100;
        padding: 16px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        background: rgba(13, 22, 36, 0.92);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        transition: background 0.3s;
      }
      .nav-logo {
        font-family: "Lilita One", cursive;
        font-size: 1.5rem;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo .logo-text span {
        color: var(--golden);
      }
      .nav-links {
        display: flex;
        gap: 30px;
        list-style: none;
      }
      .nav-links a {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.5px;
        transition: color 0.3s;
      }
      .nav-links a:hover {
        color: var(--golden);
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--cream);
        padding: 8px 18px;
        border-radius: 10px;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
      }
      .back-btn:hover {
        background: rgba(255, 255, 255, 0.18);
        border-color: var(--golden);
        color: var(--golden);
      }

      /* Navbar marching geese (index.html) */
      .nav-goose-stage {
        flex: 1;
        overflow: hidden;
        height: 54px;
        position: relative;
        margin-left: 20px;
        min-width: 0;
      }
      .nav-goose-center {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        transform: translateY(-50%);
      }
      .nav-goose-track {
        display: flex;
        align-items: center;
        white-space: nowrap;
        animation: nav-goose-march 40s linear infinite;
      }
      .nav-goose {
        display: inline-block;
        flex-shrink: 0;
        animation: nav-goose-walk 0.45s ease-in-out infinite alternate;
      }
      .nav-goose:nth-child(2n) {
        animation-delay: 0.07s;
      }
      .nav-goose:nth-child(3n) {
        animation-delay: 0.14s;
      }
      .nav-goose:nth-child(4n) {
        animation-delay: 0.21s;
      }
      .nav-goose:nth-child(5n) {
        animation-delay: 0.28s;
      }
      .nav-goose:nth-child(6n) {
        animation-delay: 0.35s;
      }
      @keyframes nav-goose-walk {
        from {
          transform: translateY(0px) rotate(-4deg);
        }
        to {
          transform: translateY(-5px) rotate(4deg);
        }
      }
      .nav-goose .foot-l {
        animation: foot-l 0.45s ease-in-out infinite;
      }
      .nav-goose .foot-r {
        animation: foot-r 0.45s ease-in-out infinite;
      }
      @keyframes foot-l {
        0%,
        100% {
          transform: rotate(-20deg);
          transform-origin: 50% 0%;
        }
        50% {
          transform: rotate(15deg);
          transform-origin: 50% 0%;
        }
      }
      @keyframes foot-r {
        0%,
        100% {
          transform: rotate(15deg);
          transform-origin: 50% 0%;
        }
        50% {
          transform: rotate(-20deg);
          transform-origin: 50% 0%;
        }
      }
      @keyframes nav-goose-march {
        0% {
          transform: translateX(-50%);
        }
        100% {
          transform: translateX(0%);
        }
      }

      /* ===== SCANNING OVERLAY ===== */
      .scan-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: var(--dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition:
          opacity 0.6s,
          visibility 0.6s;
      }
      .scan-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .scan-goose {
        width: 140px;
        height: 160px;
        animation: goose-scan-bob 1s ease-in-out infinite;
      }
      @keyframes goose-scan-bob {
        0%,
        100% {
          transform: translateY(0) rotate(-2deg);
        }
        50% {
          transform: translateY(-15px) rotate(2deg);
        }
      }

      .scan-text {
        font-family: "Lilita One", cursive;
        font-size: 1.8rem;
        color: var(--white);
        margin-top: 24px;
        text-shadow: 2px 2px 0 var(--barn-orange);
      }

      .scan-progress-bar {
        width: 320px;
        height: 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        margin-top: 20px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .scan-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--sky),
          var(--grass),
          var(--golden)
        );
        border-radius: 20px;
        transition: width 0.3s;
        position: relative;
      }
      .scan-progress-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .scan-status {
        margin-top: 14px;
        font-size: 0.85rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.5);
        font-family: "JetBrains Mono", monospace;
        min-height: 20px;
      }

      .scan-feathers {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .scan-feather {
        position: absolute;
        width: 16px;
        height: 32px;
        animation: featherFall linear infinite;
      }
      @keyframes featherFall {
        0% {
          transform: translateY(-50px) rotate(0deg) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(100vh) rotate(720deg) translateX(60px);
          opacity: 0;
        }
      }

      /* ===== MAIN REPORT ===== */
      .report-page {
        padding: 90px 24px 40px;
        max-width: 1100px;
        margin: 0 auto;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.6s 0.3s,
          transform 0.6s 0.3s;
      }
      .report-page.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Header */
      .report-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }
      .report-header-left {
        flex: 1;
        min-width: 280px;
      }

      .report-title {
        font-family: "Lilita One", cursive;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        color: var(--white);
        text-shadow: 2px 2px 0 var(--barn-orange);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .report-repo {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9rem;
        color: var(--sky);
        font-weight: 600;
        word-break: break-all;
      }
      .report-meta {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .meta-item {
        font-size: 0.8rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.45);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .report-score-box {
        text-align: center;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 24px 30px;
        min-width: 180px;
      }
      .score-label {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.45);
        margin-bottom: 8px;
      }
      .score-ring {
        width: 100px;
        height: 100px;
        margin: 0 auto 8px;
        position: relative;
      }
      .score-ring svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .score-ring-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 8;
      }
      .score-ring-fill {
        fill: none;
        stroke-width: 8;
        stroke-linecap: round;
        transition: stroke-dashoffset 1.5s ease-out;
      }
      .score-value {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Lilita One", cursive;
        font-size: 1.8rem;
        color: var(--white);
      }
      .score-grade {
        font-family: "Lilita One", cursive;
        font-size: 1rem;
      }

      /* Severity summary cards */
      .severity-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 30px;
      }
      @media (max-width: 700px) {
        .severity-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .severity-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
        cursor: default;
      }
      .severity-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .severity-card.critical::before {
        background: var(--critical);
      }
      .severity-card.high::before {
        background: var(--high);
      }
      .severity-card.medium::before {
        background: var(--medium);
      }
      .severity-card.low::before {
        background: var(--low);
      }

      .severity-card:hover {
        transform: translateY(-4px);
        border-color: rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.07);
      }
      .severity-count {
        font-family: "Lilita One", cursive;
        font-size: 2.4rem;
        line-height: 1;
        margin-bottom: 4px;
      }
      .severity-card.critical .severity-count {
        color: var(--critical);
      }
      .severity-card.high .severity-count {
        color: var(--high);
      }
      .severity-card.medium .severity-count {
        color: var(--medium);
      }
      .severity-card.low .severity-count {
        color: var(--low);
      }

      .severity-label {
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.45);
      }

      /* Vulnerability list */
      .vuln-section-title {
        font-family: "Lilita One", cursive;
        font-size: 1.4rem;
        color: var(--white);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .vuln-section-title span {
        color: var(--golden);
      }

      .vuln-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 40px;
      }

      .vuln-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 20px 24px;
        transition: all 0.3s;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        animation: slideUp 0.5s ease-out both;
      }
      .vuln-card:nth-child(1) {
        animation-delay: 0.1s;
      }
      .vuln-card:nth-child(2) {
        animation-delay: 0.2s;
      }
      .vuln-card:nth-child(3) {
        animation-delay: 0.3s;
      }
      .vuln-card:nth-child(4) {
        animation-delay: 0.4s;
      }
      .vuln-card:nth-child(5) {
        animation-delay: 0.5s;
      }
      .vuln-card:nth-child(6) {
        animation-delay: 0.6s;
      }
      .vuln-card:nth-child(7) {
        animation-delay: 0.7s;
      }
      .vuln-card:nth-child(8) {
        animation-delay: 0.8s;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .vuln-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 4px;
      }
      .vuln-card.critical::before {
        background: var(--critical);
      }
      .vuln-card.high::before {
        background: var(--high);
      }
      .vuln-card.medium::before {
        background: var(--medium);
      }
      .vuln-card.low::before {
        background: var(--low);
      }

      .vuln-card:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateX(4px);
      }

      .vuln-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .vuln-name {
        font-weight: 800;
        font-size: 1rem;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .vuln-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 8px;
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .vuln-badge.critical {
        background: rgba(255, 77, 106, 0.15);
        color: var(--critical);
        border: 1px solid rgba(255, 77, 106, 0.3);
      }
      .vuln-badge.high {
        background: rgba(255, 138, 43, 0.15);
        color: var(--high);
        border: 1px solid rgba(255, 138, 43, 0.3);
      }
      .vuln-badge.medium {
        background: rgba(255, 217, 61, 0.15);
        color: var(--medium);
        border: 1px solid rgba(255, 217, 61, 0.3);
      }
      .vuln-badge.low {
        background: rgba(74, 222, 96, 0.15);
        color: var(--low);
        border: 1px solid rgba(74, 222, 96, 0.3);
      }

      .vuln-desc {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 600;
        line-height: 1.5;
        margin-bottom: 10px;
      }
      .vuln-row {
        margin-bottom: 0.55rem;
      }
      .vuln-row .vuln-call-hint {
        margin-top: 0.2rem;
        margin-bottom: 0;
        font-weight: 500;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.5);
      }
      .vuln-row:last-child {
        margin-bottom: 0;
      }

      .vuln-finding {
        margin-bottom: 1rem;
        overflow: visible;
      }
      .vuln-finding:last-child {
        margin-bottom: 0;
      }
      .vuln-finding-head {
        margin-bottom: 0.35rem;
      }
      .vuln-finding-head .vuln-type {
        margin-top: 0.25rem;
      }
      .vuln-finding-meta .vuln-call-hint {
        margin-top: 0.2rem;
        margin-bottom: 0;
      }

      /* Collapsible sections under each finding (source + CVEs) */
      .vuln-finding-sections {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        margin-top: 0.45rem;
      }
      .vuln-details {
        border-radius: 9px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(8, 14, 24, 0.92);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }
      .vuln-details--cve {
        border-color: rgba(58, 175, 255, 0.35);
        background: rgba(10, 22, 38, 0.94);
      }
      .vuln-details__summary {
        list-style: none;
        cursor: pointer;
        padding: 0.48rem 0.7rem;
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
        display: flex;
        align-items: center;
        gap: 0.4rem;
        user-select: none;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .vuln-details__summary::-webkit-details-marker {
        display: none;
      }
      .vuln-details__summary::before {
        content: "▸";
        font-size: 0.65rem;
        opacity: 0.75;
        transition: transform 0.18s ease;
        flex-shrink: 0;
      }
      .vuln-details[open] > .vuln-details__summary::before {
        transform: rotate(90deg);
      }
      .vuln-details__summary:hover {
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.95);
      }
      .vuln-details--cve .vuln-details__summary:hover {
        background: rgba(58, 175, 255, 0.16);
      }
      .vuln-details__hint {
        font-weight: 600;
        text-transform: none;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.42);
        font-size: 0.68rem;
      }
      .vuln-details__body {
        padding: 0 0.45rem 0.55rem;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(5, 10, 18, 0.55);
      }
      .vuln-details__body--cve {
        padding-top: 0.35rem;
      }
      .vuln-cve-empty {
        margin: 0;
        font-size: 0.74rem;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.72);
        font-weight: 600;
      }
      .vuln-cve-code {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.68rem;
        color: rgba(180, 220, 255, 0.9);
        background: rgba(0, 0, 0, 0.25);
        padding: 1px 6px;
        border-radius: 4px;
      }
      .vuln-cve-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .vuln-cve-item {
        margin-bottom: 0.45rem;
        font-size: 0.72rem;
        line-height: 1.35;
      }
      .vuln-cve-item:last-child {
        margin-bottom: 0;
      }
      .vuln-cve-link {
        color: var(--sky);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-weight: 700;
        text-decoration: none;
      }
      .vuln-cve-link:hover {
        text-decoration: underline;
      }
      .vuln-cve-pub {
        margin-left: 0.45rem;
        color: rgba(255, 255, 255, 0.38);
        font-size: 0.65rem;
      }
      .vuln-cve-desc {
        margin-top: 0.2rem;
        color: rgba(255, 255, 255, 0.55);
        font-size: 0.68rem;
        line-height: 1.4;
      }
      .vuln-blame {
        display: flex;
        flex-direction: column;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        overflow: hidden;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.72rem;
        background: rgba(4, 8, 16, 0.95);
      }
      .vuln-blame-line {
        display: grid;
        grid-template-columns: 3.1rem minmax(0, 1fr) minmax(5.5rem, auto);
        gap: 0.45rem;
        align-items: start;
        padding: 0.18rem 0.45rem;
        transition: background 0.18s ease;
      }
      .vuln-blame-line:hover {
        background: rgba(255, 255, 255, 0.045);
      }
      .vuln-blame-line--hit {
        background: rgba(255, 95, 70, 0.07);
      }
      .vuln-blame-line--hit:hover {
        background: rgba(255, 95, 70, 0.14);
      }
      .vuln-blame-line--anchor {

      .vuln-blame-gutter {

        color: rgba(255, 255, 255, 0.38);

        color: rgba(255, 200, 140, 0.98);
        font-weight: 700;
        background: rgba(255, 100, 70, 0.16);

      .vuln-blame-code {
        white-space: pre-wrap;
        word-break: break-word;
        color: rgba(230, 238, 248, 0.92);
        line-height: 1.48;
        padding-top: 0.05rem;
      }
      .vuln-blame-code-fence {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: inherit;
        background: transparent !important;
        padding: 0 !important;
        margin: 0;
        border: none !important;
        border-radius: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: inherit;

      /* Prism token colors (scoped — no default prism.css loaded) */
      .vuln-blame .token.comment,
      .vuln-blame .token.block-comment,
      .vuln-blame .token.prolog,
      .vuln-blame .token.cdata {
        color: rgba(120, 170, 150, 0.85);
        font-style: italic;
      }
      .vuln-blame .token.string,
      .vuln-blame .token.char,
      .vuln-blame .token.attr-value {
        color: rgba(130, 210, 160, 0.95);
      }
      .vuln-blame .token.number,
      .vuln-blame .token.boolean {
        color: rgba(255, 200, 120, 0.95);
      }
      .vuln-blame .token.keyword,
      .vuln-blame .token.constant,
      .vuln-blame .token.builtin {
        color: #c792ea;
        font-weight: 600;
      }
      .vuln-blame .token.class-name {
        color: #ffcb6b;
      }
      .vuln-blame .token.function {
        color: #82aaff;
      }
      .vuln-blame .token.macro.property,
      .vuln-blame .token.directive {
        color: #89ddff;
      }
      .vuln-blame .token.operator {
        color: rgba(200, 220, 255, 0.75);
      }
      .vuln-blame .token.punctuation {
        color: rgba(200, 210, 230, 0.65);

      .vuln-blame-meta {
        text-align: right;
        align-self: center;
        padding-right: 0.15rem;
      }
      .vuln-blame-type {
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 700;
        color: rgba(255, 186, 120, 0.96);
        background: rgba(255, 100, 70, 0.12);
        border: 1px solid rgba(255, 150, 110, 0.35);
        border-radius: 5px;
        padding: 2px 7px;
        letter-spacing: 0.02em;
        white-space: nowrap;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .vuln-blame-line--ellipsis {
        display: block;

        border-bottom: 1px dashed rgba(255, 255, 255, 0.08);

      .vuln-blame-line--ellipsis:hover {
        background: rgba(255, 255, 255, 0.03);

      .vuln-blame-ellipsis-label {
        color: rgba(255, 255, 255, 0.42);
        font-style: italic;
        letter-spacing: 0.03em;
      }

      .vuln-type {
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: rgba(255, 186, 120, 0.92);
        margin-top: 0.15rem;
      }

      .vuln-type-with-tip {
        position: relative;
        display: inline-block;
        margin-top: 0.15rem;
        cursor: help;
        outline: none;
        z-index: 25;
      }
      .vuln-type-label {
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: rgba(255, 186, 120, 0.92);
        border-bottom: 1px dashed rgba(255, 186, 120, 0.45);
      }
      .vuln-type-popup {
        display: none;
        position: absolute;
        left: 0;
        top: calc(100% + 10px);

        z-index: 100;

        max-height: min(38vh, 260px);

        padding: 12px 14px;
        font-size: 0.78rem;
        font-weight: 600;
        line-height: 1.5;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.95);
        background: rgba(10, 16, 28, 0.98);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.65);
        pointer-events: none;
      }
      .vuln-type-with-tip:hover .vuln-type-popup,
      .vuln-type-with-tip:focus-within .vuln-type-popup {
        display: block;
      }
      .vuln-blame-type[title] {
        cursor: help;
        border-bottom: 1px dotted rgba(255, 186, 120, 0.5);
      }
      .vuln-file {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--sky);
        background: rgba(58, 175, 255, 0.08);
        padding: 4px 10px;
        border-radius: 6px;
        display: inline-block;
        margin-right: 8px;
        font-weight: 600;
      }
      .vuln-cve {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.35);
        font-weight: 600;
      }

      .vuln-fix {
        margin-top: 12px;
        padding: 12px 16px;
        background: rgba(74, 222, 96, 0.06);
        border: 1px solid rgba(74, 222, 96, 0.15);
        border-radius: 10px;
        display: none;
      }
      .vuln-card.expanded .vuln-fix {
        display: block;
      }

      .vuln-fix-label {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--grass);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .vuln-fix-text {
        font-size: 0.83rem;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 600;
        line-height: 1.5;
      }
      .vuln-fix-code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--grass);
        background: rgba(0, 0, 0, 0.3);
        padding: 10px 14px;
        border-radius: 8px;
        margin-top: 8px;
        display: block;
        white-space: pre-wrap;
        overflow-x: auto;
      }

      .expand-hint {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.3);
        font-weight: 700;
        margin-top: 6px;
        text-align: right;
      }
      .vuln-card.expanded .expand-hint {
        display: none;
      }

      /* Goose report buddy */
      .report-goose {
        position: fixed;
        bottom: 20px;
        right: 24px;
        z-index: 50;
        animation: goose-float 3s ease-in-out infinite;
        cursor: pointer;
      }
      @keyframes goose-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .goose-tip {
        position: absolute;
        bottom: 110%;
        right: 0;
        background: var(--white);
        color: var(--dark);
        font-family: "Nunito", sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        padding: 10px 16px;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        width: 220px;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.3s;
        pointer-events: none;
        line-height: 1.4;
      }
      .goose-tip::after {
        content: "";
        position: absolute;
        bottom: -7px;
        right: 30px;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-top: 8px solid var(--white);
      }
      .report-goose:hover .goose-tip {
        opacity: 1;
        transform: translateY(0);
      }

      /* Background effects */
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse at 10% 20%,
            rgba(58, 175, 255, 0.04),
            transparent 50%
          ),
          radial-gradient(
            ellipse at 90% 80%,
            rgba(74, 222, 96, 0.04),
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            rgba(255, 138, 43, 0.02),
            transparent 60%
          );
      }
      .bg-dots {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px
        );
        background-size: 30px 30px;
      }

      .scene-meadow {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 200px;
        pointer-events: none;
        z-index: 2;
        overflow: hidden;
      }
      .scene-meadow::before {
        content: "";
        position: absolute;
        inset: auto -5% -28px;
        height: 170px;
        background: linear-gradient(
          180deg,
          #53d56c 0%,
          #39b652 58%,
          #2d9e3f 100%
        );
        border-radius: 46% 54% 0 0 / 26% 24% 0 0;
        filter: drop-shadow(0 -8px 22px rgba(30, 125, 55, 0.35));
      }
      .scene-meadow::after {
        content: "";
        position: absolute;
        left: -8%;
        right: -8%;
        bottom: 112px;
        height: 86px;
        background: radial-gradient(
          ellipse at top,
          rgba(120, 255, 145, 0.45),
          transparent 68%
        );
      }
      .meadow-grass {
        position: absolute;
        inset: auto 0 0;
        height: 170px;
      }
      .meadow-blade {
        position: absolute;
        bottom: -14px;
        width: 6px;
        border-radius: 10px 10px 0 0;
        background: linear-gradient(to top, #2f9d41, #7aeb8f);
        transform-origin: bottom center;
        animation: meadow-sway 3.2s ease-in-out infinite;
      }
      @keyframes meadow-sway {
        0%,
        100% {
          transform: rotate(-3deg);
        }
        50% {
          transform: rotate(3deg);
        }
      }

      .scene-goose-row {
        position: fixed;
        left: 50%;
        bottom: 34px;
        transform: translateX(-50%);
        width: calc(100vw - 16px);
        height: 130px;
        pointer-events: none;
        z-index: 4;
      }
      .scene-goose-item {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: clamp(80px, 8.8vw, 108px);
        height: auto;
        --goose-x: 0px;
        --goose-base: scale(1) rotate(0deg);
        --goose-bob: -8px;
        --goose-opacity: 1;
        --goose-lift: 0px;
        transform: translateX(calc(-50% + var(--goose-x))) var(--goose-base);
        opacity: var(--goose-opacity);
        bottom: var(--goose-lift);
        animation: scene-goose-row-bob 3s ease-in-out infinite;
        transform-origin: center bottom;
      }
      .scene-goose-item svg {
        width: 100%;
        height: auto;
      }
      @keyframes scene-goose-row-bob {
        0%,
        100% {
          transform: translateX(calc(-50% + var(--goose-x))) var(--goose-base)
            translateY(0);
        }
        50% {
          transform: translateX(calc(-50% + var(--goose-x))) var(--goose-base)
            translateY(var(--goose-bob));
        }
      }

      /* Footer */
      .footer {
        background: #0a1520;
        padding: 24px;
        text-align: center;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.35);
        font-weight: 600;
        border-top: 2px solid rgba(255, 255, 255, 0.05);
        position: relative;
        z-index: 1;
      }
      .footer span {
        color: var(--golden);
      }

      /* Sprout wiggle */
      @keyframes sprout-wiggle {
        0%,
        100% {
          transform: rotate(-8deg);
        }
        50% {
          transform: rotate(8deg);
        }
      }

      /* Actions bar */
      .actions-bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 30px;
      }
      .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 12px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.3s;
        border: none;
      }
      .action-btn.primary {
        background: linear-gradient(
          135deg,
          var(--barn-orange),
          var(--barn-red)
        );
        color: white;
      }
      .action-btn.primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(229, 77, 46, 0.3);
      }
      .action-btn.secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--cream);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .action-btn.secondary:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: var(--golden);
        color: var(--golden);
      }

      /* Dependency table */
      .dep-section {
        margin-bottom: 40px;
      }
      .dep-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 6px;
      }
      .dep-table th {
        text-align: left;
        padding: 10px 16px;
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.35);
      }
      .dep-table td {
        padding: 12px 16px;
        background: var(--card-bg);
        font-size: 0.85rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.7);
      }
      .dep-table tr td:first-child {
        border-radius: 10px 0 0 10px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        color: var(--sky);
      }
      .dep-table tr td:last-child {
        border-radius: 0 10px 10px 0;
      }
      .dep-outdated {
        color: var(--barn-orange);
        font-weight: 800;
      }
      .dep-ok {
        color: var(--grass);
        font-weight: 800;
      }

      @media (max-width: 600px) {
        .report-header {
          flex-direction: column;
        }
        .navbar {
          padding: 12px 16px;
        }
        .nav-links {
          display: none;
        }
        .report-page {
          padding: 88px 16px 100px;
        }
        .nav-goose-stage {
          display: none;
        }
        .scene-meadow {
          height: 170px;
        }
        .scene-goose-row {
          bottom: 20px;
          width: calc(100vw - 10px);
          height: 100px;
        }
        .scene-goose-item {
          width: 62px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01s !important;
          transition-duration: 0.01s !important;
        }
      }

      /* Minimal report-specific styling */
      .report-goose,
      .footer {
        display: none !important;
      }

      .report-page {
        position: relative;
        z-index: 10;
        padding: 96px 24px 120px;
        max-width: 900px;
        margin: 0 auto;
        min-height: 100vh;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      .report-page.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .report-title-area {
        margin-bottom: 32px;
        text-align: center;
      }

      .report-title {
        font-family: "Lilita One", cursive;
        font-size: clamp(2.2rem, 5vw, 3.4rem);
        letter-spacing: -0.04em;
        color: #ffffff;
        margin-bottom: 10px;
        text-shadow:
          2px 2px 0 rgba(255, 138, 43, 0.45),
          0 0 28px rgba(255, 217, 61, 0.2);
      }

      .vuln-list {
        display: grid;
        gap: 16px;
      }

      .vuln-card {
        background: rgba(10, 18, 32, 0.94);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        padding: 22px 24px;
        box-shadow:
          0 12px 40px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        overflow: visible;
      }

      .vuln-name {
        font-size: 1rem;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 10px;
      }

      .vuln-desc {
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.6;
        margin-bottom: 14px;
      }

      .vuln-file {
        display: block;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.95rem;
        color: #d6efff;
        background: rgba(12, 40, 72, 0.88);
        border: 1px solid rgba(58, 175, 255, 0.28);
        padding: 12px 14px;
        border-radius: 14px;
        margin-bottom: 10px;
        word-break: break-word;
      }

      .report-loading {
        border-color: rgba(58, 175, 255, 0.25);
      }

      .report-back-btn {
        display: inline-block;
        padding: 10px 18px;
        margin-bottom: 24px;
        background: rgba(18, 32, 52, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.92);
        text-decoration: none;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .report-back-btn:hover {
        background: rgba(28, 48, 78, 0.98);
        border-color: rgba(255, 217, 61, 0.65);
        color: #ffd93d;
      }

      .report-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 24px;
        padding: 14px 18px;
        background: rgba(8, 16, 28, 0.88);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }
      .report-toolbar .report-back-btn {
        margin-bottom: 0;
      }
      .report-toolbar .report-pdf-btn {
        margin-left: auto;
      }
      .report-pdf-btn {
        display: inline-block;
        padding: 10px 18px;
        background: rgba(20, 55, 92, 0.95);
        border: 1px solid rgba(58, 175, 255, 0.45);
        border-radius: 12px;
        color: #dff3ff;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .report-pdf-btn:hover:not(:disabled) {
        background: rgba(30, 75, 118, 0.98);
        border-color: rgba(255, 217, 61, 0.55);
        color: #ffffff;
      }
      .report-pdf-btn:disabled {
        opacity: 0.65;
        cursor: wait;
      }
    </style>

    <script>
      // Parse repo URL from query params
      const params = new URLSearchParams(window.location.search);
      const repoUrl = params.get("repo");

      const BACKEND_BASE_URL = window.location.origin;
      const SCAN_URL = `${BACKEND_BASE_URL}/api/scan`;
      const STATUS_URL = `${BACKEND_BASE_URL}/api/scan/status`;
      const VULN_URL = `${BACKEND_BASE_URL}/api/vulnerabilities.json`;
      const REPORT_PDF_URL = `${BACKEND_BASE_URL}/api/report.pdf`;
      const POLL_DELAY_MS = 1000;

      /** Set from GET /api/health before scan — false when server has no GEMINI_API_KEY. */
      let geminiVerifyConfigured = true;

      function makeNavGooseSVG(tint) {
        const bodyColors = [
          "#FFF5E0",
          "#FFEFD5",
          "#FFF8EC",
          "#FFFAF0",
          "#FAEBD7",
        ];
        const beakColors = [
          "#F0A030",
          "#E8952A",
          "#F5A828",
          "#ED9A20",
          "#F2A535",
        ];
        const sproutColors = [
          "#5CB85C",
          "#4CAF50",
          "#66BB6A",
          "#43A047",
          "#56A856",
        ];
        const i = tint % bodyColors.length;
        return `<svg width="38" height="50" viewBox="0 0 60 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="52" rx="20" ry="24" fill="${bodyColors[i]}" stroke="#3A3226" stroke-width="2.5"/>

        <polygon points="48,36 56,39 48,42" fill="${beakColors[i]}" stroke="#3A3226" stroke-width="1.5" stroke-linejoin="round"/>
      </g>
      <circle cx="42" cy="34" r="2.5" fill="#3A3226"/>
      <circle cx="43" cy="33.2" r="0.8" fill="white"/>
      <ellipse cx="36" cy="40" rx="5" ry="3" fill="#FFB4B4" opacity="0.35"/>
      <g class="sprout" style="animation:sprout-wiggle 3s ease-in-out infinite; transform-origin:30px 28px;">
        <line x1="30" y1="28" x2="30" y2="14" stroke="${sproutColors[i]}" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="25" cy="12" rx="5" ry="3.5" fill="${sproutColors[i]}" transform="rotate(-25,25,12)"/>
        <ellipse cx="35" cy="12" rx="5" ry="3.5" fill="${sproutColors[i]}" transform="rotate(25,35,12)"/>
      </g>
      <ellipse cx="22" cy="52" rx="10" ry="7" fill="rgba(200,185,160,0.4)" stroke="#3A3226" stroke-width="1.5" transform="rotate(-10,22,52)"/>
      <g class="foot-l" style="transform-origin:26px 74px;">
        <line x1="26" y1="74" x2="20" y2="80" stroke="#F0A030" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="80" x2="15" y2="79" stroke="#F0A030" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="80" x2="18" y2="77" stroke="#F0A030" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="80" x2="22" y2="77" stroke="#F0A030" stroke-width="2" stroke-linecap="round"/>
      </g>
      <g class="foot-r" style="transform-origin:34px 74px;">
        <line x1="34" y1="74" x2="40" y2="80" stroke="#F0A030" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="80" x2="46" y2="79" stroke="#F0A030" stroke-width="2" stroke-linecap="round"/>
        <line x1="40" y1="80" x2="43" y2="77" stroke="#F0A030" stroke-width="2" stroke-linecap="round"/>
        <line x1="40" y1="80" x2="38" y2="77" stroke="#F0A030" stroke-width="2" stroke-linecap="round"/>

      }

      function buildGooseTrack() {
        const track = document.getElementById("navGooseTrack");
        const stage = document.getElementById("navGooseStage");
        if (!track || !stage) return;
        const stageWidth = stage.offsetWidth || window.innerWidth;
        /* Sparser parade: wider spacing between navbar geese */
        const count = Math.ceil((stageWidth * 2) / 72) + 2;
        let html = "";
        for (let i = 0; i < count; i++) {
          html += `<span class="nav-goose">${makeNavGooseSVG(i)}</span>`;
        }
        track.innerHTML = html + html;
      }

      // Generate scan feathers
      const sf = document.getElementById("scanFeathers");
      for (let i = 0; i < 12; i++) {
        const f = document.createElement("div");
        f.className = "scan-feather";
        f.style.left = Math.random() * 100 + "%";
        f.style.animationDuration = 4 + Math.random() * 6 + "s";
        f.style.animationDelay = Math.random() * 5 + "s";
        f.innerHTML = `<svg viewBox="0 0 16 32" fill="none"><path d="M8 0 C8 0 3 8 2 16 C1 24 6 32 8 32 C10 32 15 24 14 16 C13 8 8 0 8 0Z" fill="rgba(245,240,232,0.6)"/></svg>`;
        sf.appendChild(f);
      }

      function generateMeadowGrass() {
        const host = document.getElementById("meadowGrass");
        if (!host) return;
        host.innerHTML = "";
        for (let i = 0; i < 150; i++) {
          const blade = document.createElement("div");
          blade.className = "meadow-blade";
          blade.style.left = Math.random() * 100 + "%";
          blade.style.height = 28 + Math.random() * 76 + "px";
          blade.style.opacity = 0.56 + Math.random() * 0.38;
          blade.style.animationDelay = Math.random() * 2.8 + "s";
          blade.style.animationDuration = 2.8 + Math.random() * 1.8 + "s";
          host.appendChild(blade);
        }
      }

      function gooseSvgMarkup(eyeMode) {
        const eyeHtml =
          eyeMode === "closed"
            ? `<path d="M42 44 Q47 40 52 44" stroke="#3A3226" stroke-width="2.5" fill="none" stroke-linecap="round" /><path d="M68 44 Q73 40 78 44" stroke="#3A3226" stroke-width="2.5" fill="none" stroke-linecap="round" />`
            : `<circle cx="47" cy="44" r="3.5" fill="#3A3226" /><circle cx="73" cy="44" r="3.5" fill="#3A3226" />`;

        return `<svg viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="60" cy="80" rx="42" ry="48" fill="#FFF5E0" stroke="#3A3226" stroke-width="3.5" /><ellipse cx="60" cy="55" rx="12" ry="5.5" fill="#F0A030" stroke="#3A3226" stroke-width="2.5" />${eyeHtml}<ellipse cx="38" cy="55" rx="8" ry="4.5" fill="#FFB4B4" opacity="0.35" /><ellipse cx="82" cy="55" rx="8" ry="4.5" fill="#FFB4B4" opacity="0.35" /><ellipse cx="44" cy="128" rx="14" ry="5.5" fill="#F0A030" stroke="#3A3226" stroke-width="2.5" /><ellipse cx="76" cy="128" rx="14" ry="5.5" fill="#F0A030" stroke="#3A3226" stroke-width="2.5" /><path d="M18 72 Q8 80 18 92" stroke="#3A3226" stroke-width="2.5" fill="none" stroke-linecap="round" /><path d="M102 72 Q112 80 102 92" stroke="#3A3226" stroke-width="2.5" fill="none" stroke-linecap="round" /><g transform="translate(78, 40) rotate(15)"><circle cx="0" cy="0" r="14" fill="none" stroke="#FFD93D" stroke-width="3" /><line x1="10" y1="10" x2="20" y2="20" stroke="#FFD93D" stroke-width="3" stroke-linecap="round" /></g></svg>`;
      }

      function renderGooseRow() {
        const row = document.getElementById("sceneGooseRow");
        if (!row) return;
        const rowWidth = row.clientWidth || window.innerWidth;
        const sidePadding = 44;
        /* Fewer geese, evenly spaced left→right for symmetry (fixes empty bottom-right) */
        const inner = rowWidth - sidePadding * 2;
        let gooseCount = Math.max(4, Math.min(6, Math.floor(rowWidth / 210)));
        let widths = Array.from(
          { length: gooseCount },
          () => 68 + Math.random() * 36,
        );
        while (
          widths.length > 4 &&
          widths.reduce((a, b) => a + b, 0) > inner * 0.98
        ) {
          widths.pop();
        }
        const n = widths.length;
        const tw = widths.reduce((a, b) => a + b, 0);
        const slack = Math.max(0, inner - tw);
        const gap = n > 1 ? slack / (n - 1) : 0;
        const searchTargetX = (Math.random() - 0.5) * rowWidth * 0.2;

        const geese = [];
        let cursor = -rowWidth / 2 + sidePadding;
        for (let i = 0; i < n; i++) {
          const widthPx = widths[i];
          const x = cursor + widthPx / 2;
          const depth = (widthPx - 68) / 36;
          const y = 4 + (1 - depth) * 22 + Math.random() * 8;
          const toward = searchTargetX - x;
          const facing = toward < 0 ? -1 : 1;
          const rotate = Math.max(
            -12,
            Math.min(
              12,
              (toward / (rowWidth * 0.5)) * 8 + (Math.random() * 3 - 1.5),
            ),
          );

          geese.push({
            eye: Math.random() < 0.45 ? "closed" : "open",
            widthPx,
            x,
            y,
            facing,
            rotate,
            opacity: 0.78 + depth * 0.22,
            bob: -(5 + depth * 6),
            delay: (Math.random() * 0.9).toFixed(2) + "s",
            z: Math.round(depth * 10),
          });

          cursor += widthPx + (i < n - 1 ? gap : 0);
        }

        geese.sort((a, b) => a.z - b.z);
        row.innerHTML = geese
          .map((g) => {
            const base = `${g.facing === -1 ? "scaleX(-1) " : ""}rotate(${g.rotate.toFixed(1)}deg)`;
            const style = `width:${g.widthPx.toFixed(1)}px;--goose-x:${g.x.toFixed(1)}px;--goose-base:${base};--goose-bob:${g.bob.toFixed(1)}px;--goose-lift:${g.y.toFixed(1)}px;--goose-opacity:${g.opacity.toFixed(2)};animation-delay:${g.delay};z-index:${g.z};`;
            return `<div class="scene-goose-item" style="${style}">${gooseSvgMarkup(g.eye)}</div>`;
          })
          .join("");
      }

      buildGooseTrack();
      window.addEventListener("resize", buildGooseTrack);

      generateMeadowGrass();
      renderGooseRow();
      window.addEventListener("resize", renderGooseRow);

      function setScanOverlay(text, statusText, pct) {
        document.getElementById("scanText").textContent = text;
        document.getElementById("scanStatus").textContent = statusText;
        document.getElementById("scanFill").style.width = `${pct}%`;
      }

      function scanProgressSubtitle(payload) {
        const mlOnlyNote =
          geminiVerifyConfigured === false
            ? "ML-only (Gemini API not configured on server). "
            : "";

        const phase = payload.phase;
        const files = payload.c_cpp_files;
        const tot = payload.snippets_total;
        const done = payload.snippets_scored;

        if (
          phase === "scoring_snippets" &&
          tot != null &&
          done != null &&
          files != null
        ) {
          const progressBit =
            done === 0 && tot > 0
              ? "starting ML pass (first results appear after the first batch)…"
              : `snippets ${done}/${tot}`;
          return (
            mlOnlyNote +
            `Scoring ${tot} snippet window(s) from ${files} C/C++ file(s) · ${progressBit}.`
          );
        }
        if (phase === "gemini_verify" && tot != null && done != null) {
          return `Making a Gemini API call (binary vulnerability check) · snippets ${done}/${tot}.`;
        }

        const parts = [];
        if (payload.detail) parts.push(payload.detail);
        const tail = parts.length ? parts.join(" · ") : null;
        if (tail) return mlOnlyNote + tail;
        return mlOnlyNote ? mlOnlyNote.trim() : null;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escapeHtmlAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/\n/g, " ")
          .replace(/\r/g, " ");
      }

      /** C/C++ syntax highlight for blame lines; falls back to escaped plain text if Prism fails. */
      function highlightCppSource(raw) {
        const s = raw != null ? String(raw) : "";
        if (
          typeof Prism !== "undefined" &&
          Prism.languages &&
          Prism.languages.cpp
        ) {
          try {
            return Prism.highlight(s, Prism.languages.cpp, "cpp");
          } catch (e) {
            /* offline or grammar error */
          }
        }
        return escapeHtml(s);
      }

      function formatVulnTypeLabel(t) {
        if (!t || typeof t !== "string") return "";
        const words = t.replace(/_/g, " ").trim().split(/\s+/);
        if (!words.length) return "";
        return words
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
          .join(" ");
      }

      /** Hover/focus popup when Gemini provided type_explanation; else plain label. */
      function renderVulnTypeBlock(displayLabel, rawExplanation) {
        if (!displayLabel) return "";
        const label = escapeHtml(displayLabel);
        const tip =
          rawExplanation != null && String(rawExplanation).trim()
            ? String(rawExplanation).trim()
            : "";
        if (!tip) {
          return `<div class="vuln-type">${label}</div>`;
        }
        return `<div class="vuln-type-with-tip" tabindex="0">
    <span class="vuln-type-label">${label}</span>
    <div class="vuln-type-popup" role="tooltip">${escapeHtml(tip)}</div>
  </div>`;
      }

      function renderCodeContextBlock(f, typDisplay) {
        const ctx = f.code_context;
        if (!Array.isArray(ctx) || !ctx.length) return "";
        const typEscaped = typDisplay ? escapeHtml(typDisplay) : "";
        const tipRaw =
          f.type_explanation != null && String(f.type_explanation).trim()
            ? String(f.type_explanation).trim()
            : "";
        const titleAttr = tipRaw
          ? ` title="${escapeHtmlAttr(tipRaw)}"`
          : "";
        const typePillHtml = typEscaped
          ? `<span class="vuln-blame-type"${titleAttr}>${typEscaped}</span>`
          : "";
        const rows = ctx
          .map((row) => {
            if (row.ellipsis) {
              const lab = escapeHtml(
                row.label || "… blank lines omitted …",
              );
              return `<div class="vuln-blame-line vuln-blame-line--ellipsis"><span class="vuln-blame-ellipsis-label">${lab}</span></div>`;
            }
            const num = row.num;
            const gutter = num != null ? String(num) : "·";
            const parts = ["vuln-blame-line"];
            if (row.in_vuln_range) parts.push("vuln-blame-line--hit");
            if (row.anchor) parts.push("vuln-blame-line--anchor");
            const meta =
              row.in_vuln_range && typePillHtml
                ? `<span class="vuln-blame-meta">${typePillHtml}</span>`
                : `<span class="vuln-blame-meta"></span>`;
            const code = row.text != null ? String(row.text) : "";
            return `<div class="${parts.join(
              " ",
            )}"><span class="vuln-blame-gutter">${escapeHtml(
              gutter,
            )}</span><span class="vuln-blame-code"><code class="language-cpp vuln-blame-code-fence">${highlightCppSource(
              code,
            )}</code></span>${meta}</div>`;
          })
          .join("");
        return `<div class="vuln-blame" aria-label="Source context">${rows}</div>`;
      }

      /** `<ul class="vuln-cve-list">…</ul>` or "" (for use inside collapsible CVE panel). */
      function renderRelatedCvesListHtml(f) {
        const list = f.related_cves;
        if (!Array.isArray(list) || !list.length) return "";
        const rows = list
          .map((c) => {
            if (!c || typeof c !== "object") return "";
            const id = c.cve_id != null ? String(c.cve_id).trim() : "";
            if (!id || !/^CVE-\d{4}-\d+$/.test(id)) return "";
            let url = c.url != null ? String(c.url).trim() : "";
            if (!/^https:\/\/nvd\.nist\.gov\/vuln\/detail\/CVE-\d{4}-\d+$/i.test(url)) {
              url = `https://nvd.nist.gov/vuln/detail/${encodeURIComponent(id)}`;
            }
            const rawDesc =
              c.description != null ? String(c.description) : "";
            const desc = rawDesc
              ? escapeHtml(rawDesc.slice(0, 300))
              : "";
            const pub =
              c.published != null
                ? escapeHtml(String(c.published).slice(0, 20))
                : "";
            return `<li class="vuln-cve-item"><a class="vuln-cve-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(id)}</a>${
              pub
                ? `<span class="vuln-cve-pub">${pub}</span>`
                : ""
            }${
              desc
                ? `<div class="vuln-cve-desc">${desc}${
                    rawDesc.length > 300 ? "…" : ""
                  }</div>`
                : ""
            }</li>`;
          })
          .filter(Boolean)
          .join("");
        if (!rows) return "";
        return `<ul class="vuln-cve-list">${rows}</ul>`;
      }

      /** Collapsible source + CVE blocks. Related CVEs is always listed; empty NVD → placeholder. */
      function renderFindingCollapsibleSections(
        blameHtml,
        cvesListHtml,
        nvdLookupRan,
      ) {
        const hasBlame = Boolean(blameHtml);
        const hasCveItems = Boolean(cvesListHtml);
        const parts = ['<div class="vuln-finding-sections">'];
        if (hasBlame) {
          parts.push(
            `<details class="vuln-details vuln-details--blame"><summary class="vuln-details__summary">Source context</summary><div class="vuln-details__body">${blameHtml}</div></details>`,
          );
        }
        let cveEmptyMsg;
        if (nvdLookupRan) {
          cveEmptyMsg = `<p class="vuln-cve-empty">NVD lookup ran for this scan but returned no CVEs for this vulnerability category (keyword search). You can clear <code class="vuln-cve-code">NVD_PUBLISHED_WINDOW_DAYS</code> (or set <code class="vuln-cve-code">0</code>) for no publication window, or check <code class="vuln-cve-code">journalctl -u harnoldseye-api</code> during a scan for HTTP/API errors.</p>`;
        } else {
          cveEmptyMsg = `<p class="vuln-cve-empty">No CVE enrichment on this report. The scanner did not attach <code class="vuln-cve-code">related_cves</code> (NVD was off for that scan, or the report predates NVD). Set <code class="vuln-cve-code">NVD_CVE_LOOKUP=1</code> in <code class="vuln-cve-code">/etc/harnoldseye.env</code> (no quotes needed), run <code class="vuln-cve-code">sudo systemctl restart harnoldseye-api</code>, then scan again.</p>`;
        }
        const cveBody = hasCveItems ? cvesListHtml : cveEmptyMsg;
        parts.push(
          `<details class="vuln-details vuln-details--cve"><summary class="vuln-details__summary">Related CVEs <span class="vuln-details__hint">· NVD</span></summary><div class="vuln-details__body vuln-details__body--cve">${cveBody}</div></details>`,
        );
        parts.push("</div>");
        return parts.join("");
      }

      function renderError(title, message) {
        document.getElementById("reportStatus").textContent = title;
        document.getElementById("vulnList").innerHTML = `
          <div class="vuln-card info">
            <div class="vuln-name">${title}</div>
            <div class="vuln-desc">${message}</div>
          </div>
        `;
        setScanOverlay("Scan stopped", message, 100);
        document.getElementById("scanOverlay").classList.add("hidden");
        document.getElementById("reportPage").classList.add("visible");
      }

      function renderVulnerabilities(payload) {
        const listEl = document.getElementById("vulnList");
        const titleEl = document.getElementById("reportStatus");
        const items = Array.isArray(payload) ? payload : [];

        if (items.length === 0) {
          titleEl.textContent = "No Vulnerabilities Detected";
          listEl.innerHTML = `
            <div class="vuln-card info">
              <div class="vuln-name">No vulnerabilities were found.</div>
            </div>
          `;
          setScanOverlay("Report complete", "No vulnerabilities found", 100);
          return;
        }

        titleEl.textContent = "Vulnerabilities found";
        listEl.innerHTML = "";

        let totalRanges = 0;
        items.forEach((item) => {
          const file = item.file_name || "Unknown file";
          const fileEsc = escapeHtml(file);
          let rangeHtml = "";

          if (Array.isArray(item.findings) && item.findings.length) {
            totalRanges += item.findings.length;
            rangeHtml = item.findings
              .map((f) => {
                const pair = f.line_numbers;
                if (!Array.isArray(pair) || pair.length !== 2) return "";
                const start = Number(pair[0]);
                const end = Number(pair[1]);
                const typRaw = f.vulnerability_type || "";
                const typ = formatVulnTypeLabel(typRaw);
                const linePart =
                  start === end
                    ? `line ${start}`
                    : `lines ${start}-${end}`;
                const typeBlock = typ
                  ? renderVulnTypeBlock(typ, f.type_explanation)
                  : "";
                let callHint = "";
                if (
                  f.finding_role === "call_site" &&
                  Array.isArray(f.sink_line_numbers) &&
                  f.sink_line_numbers.length === 2
                ) {
                  const ss = Number(f.sink_line_numbers[0]);
                  const se = Number(f.sink_line_numbers[1]);
                  const sinkPart =
                    ss === se ? `line ${ss}` : `lines ${ss}-${se}`;
                  const fn = f.sink_function
                    ? escapeHtml(String(f.sink_function))
                    : "sink";
                  callHint = `<div class="vuln-desc vuln-call-hint">Call site → ${fn} (${sinkPart})</div>`;
                }
                const blame = renderCodeContextBlock(f, typ);
                const cvesList = renderRelatedCvesListHtml(f);
                const nvdLookupRan = Array.isArray(f.related_cves);
                const sections = renderFindingCollapsibleSections(
                  blame,
                  cvesList,
                  nvdLookupRan,
                );
                return `<div class="vuln-finding"><div class="vuln-finding-head"><div class="vuln-file">${fileEsc}: ${linePart}</div>${typeBlock}${
                  callHint
                    ? `<div class="vuln-finding-meta">${callHint}</div>`
                    : ""
                }</div>${sections}</div>`;
              })
              .join("");
          } else {
            const ranges = Array.isArray(item.line_numbers) ? item.line_numbers : [];
            totalRanges += ranges.length;
            rangeHtml = ranges
              .map(([start, end]) => {
                if (start === end) {
                  return `<div class="vuln-row"><div class="vuln-file">${fileEsc}: line ${start}</div></div>`;
                }
                return `<div class="vuln-row"><div class="vuln-file">${fileEsc}: lines ${start}-${end}</div></div>`;
              })
              .join("");
          }

          listEl.insertAdjacentHTML(
            "beforeend",
            `
            <div class="vuln-card info">
              <div class="vuln-name">${fileEsc}</div>
              ${rangeHtml}
            </div>
          `,
          );
        });

        setScanOverlay(
          "Report complete",
          `${totalRanges} vulnerabilities found`,
          100,
        );
      }

      async function downloadReportPdf() {
        const btn = document.getElementById("reportPdfBtn");
        const prevLabel = btn ? btn.textContent : "";
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Preparing report…";
        }
        try {
          const resp = await fetch(REPORT_PDF_URL, { cache: "no-store" });
          if (!resp.ok) {
            let detail = resp.statusText;
            const t = await resp.text();
            try {
              const errBody = JSON.parse(t);
              if (errBody && errBody.detail) detail = String(errBody.detail);
            } catch (_) {
              if (t) detail = t.slice(0, 200);
            }
            throw new Error(detail || `HTTP ${resp.status}`);
          }
          const blob = await resp.blob();
          const cd = resp.headers.get("Content-Disposition");
          let name = "harnoldseye-vulnerability-report.pdf";
          const m = cd && cd.match(/filename="([^"]+)"/i);
          if (m) name = m[1];
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = name;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error(err);
          alert(err.message || "Report download failed.");
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.textContent = prevLabel;
          }
        }
      }

      async function loadVulnerabilities() {
        try {
          const resp = await fetch(VULN_URL, { cache: "no-store" });
          if (!resp.ok) {
            throw new Error(`Unable to load vulnerabilities (${resp.status})`);
          }
          const payload = await resp.json();
          document.getElementById("scanOverlay").classList.add("hidden");
          document.getElementById("reportPage").classList.add("visible");
          renderVulnerabilities(payload);
        } catch (err) {
          renderError(
            "Unable to load report",
            err.message || "Failed to fetch vulnerability results.",
          );
        }
      }

      async function pollScanStatus() {
        try {
          const resp = await fetch(STATUS_URL, { cache: "no-store" });
          if (!resp.ok) {
            throw new Error(`Status check failed (${resp.status})`);
          }
          const statusPayload = await resp.json();
          const status = statusPayload.status || "idle";

          if (status === "queued") {
            setScanOverlay(
              "Scan queued",
              scanProgressSubtitle(statusPayload) ||
                "Waiting for the scanner to start...",
              30,
            );
            setTimeout(pollScanStatus, POLL_DELAY_MS);
            return;
          }

          if (status === "processing") {
            const sub =
              scanProgressSubtitle(statusPayload) ||
              "Processing repository data...";
            let pct = 65;
            if (
              statusPayload.snippets_total > 0 &&
              statusPayload.snippets_scored != null
            ) {
              pct =
                12 +
                Math.round(
                  (75 * statusPayload.snippets_scored) /
                    statusPayload.snippets_total,
                );
            }
            setScanOverlay("The flock is scanning...", sub, Math.min(92, pct));
            setTimeout(pollScanStatus, POLL_DELAY_MS);
            return;
          }

          if (status === "completed") {
            setScanOverlay("HONK! Scan complete", "Fetching final report...", 90);
            await loadVulnerabilities();
            return;
          }

          if (status === "failed") {
            renderError(
              "Scan failed",
              statusPayload.error || "The backend returned a failed scan state.",
            );
            return;
          }

          setScanOverlay("Waiting on scanner", `Status: ${status}`, 50);
          setTimeout(pollScanStatus, POLL_DELAY_MS);
        } catch (err) {
          renderError(
            "Unable to poll scan status",
            err.message || "Network error while checking scan status.",
          );
        }
      }

      async function startScanFlow() {
        if (!repoUrl) {
          renderError(
            "No repository specified",
            "Return to the home screen and start the scan from there.",
          );
          return;
        }

        setScanOverlay("Preparing the flock...", "Sending scan request...", 10);

        try {
          try {
            const healthResp = await fetch(`${BACKEND_BASE_URL}/api/health`, {
              cache: "no-store",
            });
            if (healthResp.ok) {
              const h = await healthResp.json();
              geminiVerifyConfigured = h.gemini_verify_enabled === true;
            }
          } catch (_) {
            geminiVerifyConfigured = true;
          }

          const resp = await fetch(SCAN_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ github_url: repoUrl }),
          });

          if (!resp.ok) {
            const payload = await resp.json().catch(() => null);
            if (resp.status === 409) {
              setScanOverlay(
                "Scan in progress",
                payload?.detail || "Waiting for the current scan to finish...",
                25,
              );
              pollScanStatus();
              return;
            }
            throw new Error(
              payload?.detail || payload?.message || `Failed to start scan (${resp.status})`,
            );
          }

          await resp.json();
          setScanOverlay("Scan queued", "Waiting for the scanner to begin...", 25);
          pollScanStatus();
        } catch (err) {
          renderError(
            "Unable to start scan",
            err.message || "Network error while starting the scan.",
          );
        }
      }

      document
        .getElementById("reportPdfBtn")
        ?.addEventListener("click", downloadReportPdf);

      startScanFlow();
    </script>
  </body>
</html>
